name: CI/CD — Deploy to Render

on:
  push:
    branches:
      - main  # change to 'master' if that's your default branch

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build   # remove if your project has no build step

      # Optional: add tests here
      # - name: Run tests
      #   run: npm test

      - name: Trigger Render Deploy
        run: curl "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
